name: Check for New Asterisk Version

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force build specific version (optional)'
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      should_build: ${{ steps.check.outputs.should_build }}
    
    steps:
      - name: Get Latest Asterisk 22.x Version
        id: get_latest
        run: |
          LATEST_VERSION=$(curl -s https://downloads.asterisk.org/pub/telephony/asterisk/ | \
            grep -oP 'asterisk-22\.[0-9]+\.[0-9]+\.tar\.gz' | \
            sed 's/asterisk-\(.*\)\.tar\.gz/\1/' | \
            sort -V | \
            tail -n1)
          
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo ">>> Latest Asterisk 22 version: $LATEST_VERSION"
      
      - name: Get Last Built Version from GitHub Release
        id: get_last
        run: |
          # Try to get the latest release tag
          LATEST_RELEASE=""
          
          # Use GitHub CLI to get latest release (if available)
          if command -v gh &> /dev/null; then
            LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
            if [[ "$LATEST_TAG" =~ asterisk-([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              LATEST_RELEASE="${BASH_REMATCH[1]}"
            fi
          fi
          
          # Alternative: use git tags
          if [ -z "$LATEST_RELEASE" ]; then
            LATEST_TAG=$(git tag | grep 'asterisk-[0-9]\+\.[0-9]\+\.[0-9]\+' | sort -V | tail -n1)
            if [[ "$LATEST_TAG" =~ asterisk-([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              LATEST_RELEASE="${BASH_REMATCH[1]}"
            fi
          fi
          
          echo "last_version=$LATEST_RELEASE" >> $GITHUB_OUTPUT
          echo ">>> Last built version: ${LATEST_RELEASE:-none}"
      
      - name: Check if New Version Available
        id: check
        run: |
          LATEST="${{ steps.get_latest.outputs.latest_version }}"
          LAST="${{ steps.get_last.outputs.last_version }}"
          FORCE="${{ github.event.inputs.force_version }}"
          
          if [ -n "$FORCE" ]; then
            echo ">>> Force building version: $FORCE"
            echo "new_version=$FORCE" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [ -z "$LAST" ] || [ "$LATEST" != "$LAST" ]; then
            echo ">>> New version detected! Building $LATEST"
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo ">>> No new version. Latest $LATEST already built."
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
          
  trigger-build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = '${{ needs.check-version.outputs.new_version }}';
            
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build_asterisk.yml',
              ref: 'main',
              inputs: {
                asterisk_version: version
              }
            });
            
            console.log(`✅ Triggered build for Asterisk ${version}`);
