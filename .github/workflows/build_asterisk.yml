name: Build Asterisk ARM64 Native

on:
  workflow_dispatch:
    inputs:
      asterisk_version:
        description: 'Asterisk Version (e.g., 22.9.0)'
        required: true
        default: '22.9.0'
  workflow_call:
    inputs:
      asterisk_version:
        description: 'Asterisk Version to build'
        required: true
        type: string
        default: '22.9.0'

permissions:
  contents: write

jobs:
  build-asterisk:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Build Environment
        run: |
          apt-get update
          apt-get install -y git curl wget build-essential sudo

      - name: Run Builder Script (Native Mode)
        run: |
          chmod +x builder_script.sh
          ./builder_script.sh "${{ inputs.asterisk_version }}"

      - name: Extract Asterisk Version
        id: version
        shell: bash
        run: |
          # Read the real version from the file saved by builder script
          if [ -f asterisk-real-version.txt ]; then
            ASTERISK_VERSION=$(cat asterisk-real-version.txt | tr -d '\n\r')
            echo ">>> Version from builder script: '$ASTERISK_VERSION'"
          else
            echo ">>> ERROR: asterisk-real-version.txt not found!"
            exit 1
          fi
          
          # Find the tarball (there should be exactly one)
          TARBALL=$(ls asterisk-*.tar.gz 2>/dev/null | head -n1)
          
          if [ -z "$TARBALL" ]; then
            echo ">>> ERROR: No tarball found!"
            exit 1
          fi
          
          # Validate version format (should be like 22.9.0)
          if [[ ! "$ASTERISK_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo ">>> WARNING: Version format looks incorrect: '$ASTERISK_VERSION'"
            echo ">>> Attempting to extract from tarball name..."
            
            # Try to extract from tarball name as fallback
            if [[ "$TARBALL" =~ asterisk-([0-9]+\.[0-9]+\.[0-9]+)-arm64-debian13\.tar\.gz ]]; then
              ASTERISK_VERSION="${BASH_REMATCH[1]}"
              echo ">>> Extracted version from tarball: '$ASTERISK_VERSION'"
            fi
          fi
          
          BUILD_DATE=$(date +"%Y-%m-%d")
          
          echo "version=$ASTERISK_VERSION" >> $GITHUB_OUTPUT
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          
          echo ">>> === BUILD SUMMARY ==="
          echo ">>> Version: $ASTERISK_VERSION"
          echo ">>> Tarball: $TARBALL"
          echo ">>> Build Date: $BUILD_DATE"
          echo ">>> ====================="

      - name: Verify Tarball Integrity
        run: |
          echo ">>> Verifying tarball: ${{ steps.version.outputs.tarball }}"
          tar -tzf "${{ steps.version.outputs.tarball }}" | head -20
          echo ">>> Tarball verification complete"

      - name: Upload Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          tag_name: asterisk-${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: "Asterisk ${{ steps.version.outputs.version }} - ARM64 Build"
          body: |
            ## Asterisk ${{ steps.version.outputs.version }} - ARM64 Debian 13 (Trixie)
            
            **Version:** `${{ steps.version.outputs.version }}`  
            **Architecture:** ARM64 (aarch64)  
            **Target OS:** Debian 13 Trixie  
            **Build Date:** ${{ steps.version.outputs.build_date }}  
            **Build Number:** #${{ github.run_number }}
            
            ### Artifact
            
            - **File:** `${{ steps.version.outputs.tarball }}`
            - **Platform:** Native ARM64 build optimized for Raspberry Pi
            
            For more information, see the [README](https://github.com/${{ github.repository }}/blob/main/README.md).
          files: asterisk-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
